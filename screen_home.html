<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #F5F0E8; margin: 0; }
  .phone { background: #F5F0E8; width: 375px; min-height: 720px; display: flex; flex-direction: column; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .status { display: flex; justify-content: space-between; padding: 14px 24px 8px; font-size: 12px; font-weight: 500; color: #5C8C7A; }
  .top-bar { display: flex; justify-content: space-between; align-items: flex-start; padding: 8px 24px 28px; }
  .greeting-date { font-size: 12px; color: #A8C5BB; margin-bottom: 3px; }
  .greeting-name { font-size: 22px; font-weight: 500; color: #2C4A3E; }
  .av { width: 36px; height: 36px; border-radius: 50%; background: #5C8C7A; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 500; color: #E8F2EF; }
  .cards { flex: 1; padding: 0 20px 0; display: flex; flex-direction: column; gap: 12px; }
  .card { background: #5C8C7A; border-radius: 20px; padding: 20px 22px; cursor: pointer; display: flex; flex-direction: column; gap: 14px; flex: 1; }
  .card-top { display: flex; justify-content: space-between; align-items: center; }
  .card-identity { display: flex; align-items: center; gap: 10px; }
  .card-label { font-size: 10px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: #E8F2EF; opacity: 0.7; }
  .card-text { font-size: 16px; font-weight: 500; color: #F5F0E8; line-height: 1.55; }
  .intent-box { margin: 12px 20px 16px; background: #E8F2EF; border-radius: 16px; padding: 14px 18px; display: flex; align-items: center; gap: 12px; }
  .intent-label { font-size: 10px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; color: #5C8C7A; margin-bottom: 3px; }
  .intent-text { font-size: 15px; font-weight: 500; color: #2C4A3E; }
  .nav { display: flex; border-top: 0.5px solid #A8C5BB; background: #F5F0E8; padding: 8px 0 14px; }
  .nav-tab { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; padding: 4px 0; }
  .nav-label { font-size: 9px; font-weight: 500; }
</style>
</head>
<body>
<div class="phone">
  <div class="status"><span>9:41</span><span>●●●</span></div>
  <div class="top-bar">
    <div><p class="greeting-date">Wednesday, 9 April</p><p class="greeting-name">Good morning, Rachel</p></div>
    <div class="av">C</div>
  </div>
  <div class="cards">
    <div class="card">
      <div class="card-top">
        <div class="card-identity">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><circle cx="8.5" cy="11" r="7" stroke="#E8F2EF" stroke-width="1.5" fill="none" opacity="0.7"/><circle cx="13.5" cy="11" r="7" stroke="#E8F2EF" stroke-width="1.5" fill="none" opacity="0.7"/></svg>
          <span class="card-label">Reflections</span>
        </div>
        <svg width="46" height="26" viewBox="0 0 46 26" fill="none"><circle cx="13" cy="13" r="12" fill="#2C4A3E"/><circle cx="33" cy="13" r="12" fill="#2C4A3E"/><path d="M23 3.2C27 6.5 27 19.5 23 22.8C19 19.5 19 6.5 23 3.2Z" fill="#5C8C7A" opacity="0.6"/></svg>
      </div>
      <p class="card-text">"What have you been thinking about a lot lately?"</p>
    </div>
    <div class="card">
      <div class="card-top">
        <div class="card-identity">
          <svg width="22" height="22" viewBox="0 0 22 22" fill="none"><circle cx="6" cy="11" r="4.5" stroke="#E8F2EF" stroke-width="1.5" fill="none" opacity="0.7"/><line x1="10.5" y1="11" x2="11.5" y2="11" stroke="#E8F2EF" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/><circle cx="16" cy="11" r="4.5" stroke="#E8F2EF" stroke-width="1.5" fill="none" opacity="0.7"/></svg>
          <span class="card-label">Memories</span>
        </div>
        <svg width="46" height="26" viewBox="0 0 46 26" fill="none"><circle cx="13" cy="13" r="12" fill="#2C4A3E"/><circle cx="33" cy="13" r="12" fill="#2C4A3E"/><path d="M23 3.2C27 6.5 27 19.5 23 22.8C19 19.5 19 6.5 23 3.2Z" fill="#5C8C7A" opacity="0.6"/></svg>
      </div>
      <p class="card-text">Something worth holding onto today.</p>
    </div>
  </div>
  <div class="intent-box">
    <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="12" stroke="#2C4A3E" stroke-width="1.5"/><circle cx="14" cy="14" r="5.5" stroke="#2C4A3E" stroke-width="1.5"/><circle cx="14" cy="14" r="2" fill="#2C4A3E"/></svg>
    <div><p class="intent-label">Intentions</p><p class="intent-text">Communicate better</p></div>
  </div>
  <div class="nav">
    <div class="nav-tab"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="8" stroke="#2C4A3E" stroke-width="1.5" fill="none"/><circle cx="10" cy="10" r="2" fill="#2C4A3E"/></svg><span class="nav-label" style="color:#2C4A3E;">Home</span></div>
    <div class="nav-tab"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="7.5" cy="10" r="6.5" stroke="#A8C5BB" stroke-width="1.5" fill="none"/><circle cx="12.5" cy="10" r="6.5" stroke="#A8C5BB" stroke-width="1.5" fill="none"/></svg><span class="nav-label" style="color:#A8C5BB;">Reflections</span></div>
    <div class="nav-tab"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="5.5" cy="10" r="4" stroke="#A8C5BB" stroke-width="1.5" fill="none"/><line x1="9.5" y1="10" x2="10.5" y2="10" stroke="#A8C5BB" stroke-width="1.5" stroke-linecap="round"/><circle cx="14.5" cy="10" r="4" stroke="#A8C5BB" stroke-width="1.5" fill="none"/></svg><span class="nav-label" style="color:#A8C5BB;">Memories</span></div>
    <div class="nav-tab"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="8" stroke="#A8C5BB" stroke-width="1.5"/><circle cx="10" cy="10" r="3.5" stroke="#A8C5BB" stroke-width="1.5"/><circle cx="10" cy="10" r="1.2" fill="#A8C5BB"/></svg><span class="nav-label" style="color:#A8C5BB;">Intentions</span></div>
    <div class="nav-tab"><svg width="20" height="20" viewBox="0 0 20 20" fill="none"><circle cx="8" cy="10" r="5" stroke="#A8C5BB" stroke-width="1.5" fill="none"/><circle cx="12" cy="10" r="5" stroke="#A8C5BB" stroke-width="1.5" fill="none"/><path d="M10 6.5C10.8 7.8 10.8 12.2 10 13.5C9.2 12.2 9.2 7.8 10 6.5Z" fill="#A8C5BB" opacity="0.5"/></svg><span class="nav-label" style="color:#A8C5BB;">Us</span></div>
  </div>
</div>
</body>
</html>
